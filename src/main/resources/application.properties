spring.application.name=RE_FORM_Shop_2605

spring.config.import=optional:file:.env[.properties]
server.forward-headers-strategy=framework

#spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Seoul

# ----- database Connection (MariaDB) -----
spring.datasource.driver-class-name=${MARIADB_DRIVER:org.mariadb.jdbc.Driver}
spring.datasource.url=${MARIADB_URL:jdbc:mariadb://localhost:3306/reform_shop_2605}
spring.datasource.username=${MARIADB_USERNAME:admin}
spring.datasource.password=${MARIADB_PASSWORD:0507}

app.public-origin=${APP_PUBLIC_ORIGIN:http://localhost:5173}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173}

# file upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.location=${APP_UPLOAD_DIR:./uploads}
spring.servlet.multipart.max-request-size=30MB
spring.servlet.multipart.max-file-size=10MB

# redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# ----- Log4j2 logging Levels -----
logging.level.org.springframework=info
logging.level.org.example.reform_shop_2605=debug

# ----- Console log pattern -----
logging.level.org.mybatis=debug
logging.level.java.sql=debug

# logging pattern
logging.pattern.console=%clr(%-5level){green} %clr(%logger{36}.%M\\(\\)){cyan}: %msg%n

# ----- spring security logging config -----
logging.level.org.springframework.security=info

# jpa config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# mybatis
# 매퍼 파일의 위치 (resources/mapper 폴더 내의 모든 xml 인식)
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
# 카멜 케이스 자동 매핑
mybatis.configuration.map-underscore-to-camel-case=true

# 애플리케이션 시작 시 전체 경로 목록을 볼 수 있는 설정
spring.mvc.log-request-details=true

# OpenAI
spring.ai.openai.api-key=${OPENAI_API_KEY}

# PGVector용 PostgreSQL
spring.datasource.postgres.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/reform_vector}
spring.datasource.postgres.username=${POSTGRES_USERNAME:postgres}
spring.datasource.postgres.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.postgres.driver-class-name=${POSTGRES_DRIVER:org.postgresql.Driver}

# Spring AI PGVector
spring.ai.vectorstore.pgvector.initialize-schema=${PGVECTOR_INITIALIZE_SCHEMA:false}
spring.ai.vectorstore.pgvector.dimensions=1536
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE

# Toss Payments
toss.client-key=${TOSS_CLIENT_KEY}
toss.secret-key=${TOSS_SECRET_KEY}
toss.url.confirm=https://api.tosspayments.com/v1/payments/confirm

# JWT
security.jwt.secret=${SECURITY_JWT_SECRET}
# 1시간 (3600초) 동안 액세스 토큰이 유효하도록 설정
security.jwt.access-token-expiration-seconds=3600
# 2주 (1209600초) 동안 리프레시 토큰이 유효하도록 설정
security.jwt.refresh-token-expiration-seconds=1209600
app.auth.oauth-success-redirect-uri=${APP_AUTH_OAUTH_SUCCESS_REDIRECT_URI:${app.public-origin}/oauth/callback}
app.auth.oauth-failure-redirect-uri=${APP_AUTH_OAUTH_FAILURE_REDIRECT_URI:${app.public-origin}/login?error=oauth}

# KAKAO
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.user-name-attribute=id
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me

spring.security.oauth2.client.registration.kakao.client-name=kakao
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect_uri=${KAKAO_REDIRECT_URI:${app.public-origin}/login/oauth2/code/kakao}
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID}

spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET}
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email

## google
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:${app.public-origin}/login/oauth2/code/google}
spring.security.oauth2.client.registration.google.scope=email, profile
spring.security.oauth2.client.registration.google.client-name=google

# deliveryApi - key
deleveryApi.API-Key=${DELIVERYAPI_API_KEY}
deleveryApi.Secret-Key=${DELIVERYAPI_SECRET_KEY}

# Mail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:ppaapp330033@gmail.com}
spring.mail.password=${MAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
app.mail.from=${APP_MAIL_FROM:ppaapp330033@gmail.com}
app.mail.enabled=${APP_MAIL_ENABLED:true}
#app.auth.login-code-delivery-mode=${APP_AUTH_LOGIN_CODE_DELIVERY_MODE:mail}
app.auth.login-code-delivery-mode=${APP_AUTH_LOGIN_CODE_DELIVERY_MODE:log}

# Spring Batch
spring.batch.jdbc.initialize-schema=${SPRING_BATCH_INITIALIZE_SCHEMA:always}
spring.batch.job.enabled=false

# Account Verification (mock / kftc)
account.verification.type=mock
