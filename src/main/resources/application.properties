spring.application.name=RE_FORM_Shop_2605

#spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Seoul

# ----- database Connection (MariaDB) -----
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/reform_shop_2605
spring.datasource.username=admin
spring.datasource.password=0507

spring.jpa.hibernate.ddl-auto=update
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# ----- Log4j2 logging Levels -----
logging.level.org.springframework=info
logging.level.org.example.reform_shop_2605=debug

# ----- Console log pattern -----
logging.level.org.mybatis=debug
logging.level.java.sql=debug

# logging pattern
logging.pattern.console=%clr(%-5level){green} %clr(%logger{36}.%M\\(\\)){cyan}: %msg%n

## mybatis
#mybatis.mapper-locations=classpath:mapper/**/*.xml
## ----- Convert snake_case (DB) to camelCase (Java) -----
#mybatis.configuration.map-underscore-to-camel-case=true

# ----- spring security logging config -----
logging.level.org.springframework.security=info

spring.ai.model.audio.speech=none

