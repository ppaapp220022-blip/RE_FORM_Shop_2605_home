spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:reform-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=never
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=never
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.servlet.multipart.location=./build/test-uploads
security.jwt.secret=test-jwt-secret-for-unit-tests-only
security.jwt.access-token-expiration-seconds=3600
security.jwt.refresh-token-expiration-seconds=1209600
app.auth.oauth-success-redirect-uri=http://localhost:5173/oauth/callback
app.auth.oauth-failure-redirect-uri=http://localhost:5173/login?error=oauth
account.verification.type=mock
toss.secret-key=test-toss-secret
toss.client-key=test-toss-client
app.ai.vector.enabled=false
spring.ai.openai.api-key=test-openai-key
