name: Deploy Backend To Home Server

on:
  push:
    branches: [ main, master ]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/reform-shop-backend-home

jobs:
  build-and-push:
    runs-on: ubuntu-22.04

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile backend
        run: ./gradlew compileJava --no-daemon

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, Linux, X64, home-server]

    permissions:
      contents: read
      packages: read

    env:
      DEPLOY_PATH: /srv/docker/reform

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Sync compose files
        run: |
          mkdir -p "$DEPLOY_PATH"
          cp deployment/home-server/docker-compose.yml "$DEPLOY_PATH/docker-compose.yml"
          if [ ! -f "$DEPLOY_PATH/.env" ]; then
            cp deployment/home-server/.env.example "$DEPLOY_PATH/.env"
          fi

      - name: Deploy backend and infra
        run: |
          cd "$DEPLOY_PATH"
          docker compose --env-file .env pull mariadb redis pgvector backend
          docker compose --env-file .env up -d mariadb redis pgvector backend
